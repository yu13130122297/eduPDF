# Base configuration - 所有实验的公共默认值
# 覆盖方式：phase YAML 只写需要修改的字段

# 数据
bert_model: "./bert-base-chinese"
data_path: "datasets/education/"
task: "education"
task_type: "classification"
max_seq_len: 128
n_workers: 4   # 减少以节省资源
use_video_desc: True  # 或 True

# 模型基础
hidden_sz: 768
embed_sz: 300
img_hidden_sz: 2048
num_image_embeds: 1
video_feature_dim: 512
video_hidden_sz: 256
video_lstm_layers: 1
video_bidirectional: false
video_pooling_type: "mean"
freeze_video_cnn: true
video_augmentation: false
num_frames: 8    # 减少帧数加速训练
frame_sampling_strategy: "uniform"
n_classes: 10

# 训练超参
batch_sz: 8
dropout: 0.1
lr: 1.0e-4
max_epochs: 100
patience: 3
seed: 123
gradient_accumulation_steps: 4
mixed_precision: true

# 视频特征缓存
use_video_cache: true
video_cache_dir: "checkpoints/video_features"

# 损失
use_dynamic_fusion: true
fusion_loss_weight: 1.0
text_loss_weight: 0.3
video_loss_weight: 0.3
prototype_loss_weight: 0.2
confidence_reg_weight: 0.005
use_focal_loss: true
focal_gamma: 3.0
focal_alpha: 0.25
use_class_weights: true

# 新模块（默认全关，由各 phase 开启）
use_trimodal: false
use_mamba: false
use_sparse_moe: false
use_hier_fusion: false
use_prm: false

# 保存
savedir: "checkpoints/"
name: "base"
